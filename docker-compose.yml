services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dsp
      POSTGRES_USER: dsp
      POSTGRES_PASSWORD: dsp_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-dsp_dev_password}", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dsp_dev_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    ports:
      - "8124:8123"
      - "9001:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dsp_dev_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "${CLICKHOUSE_PASSWORD:-dsp_dev_password}", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    restart: unless-stopped
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9193
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19094,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9193
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19094,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      CLUSTER_ID: dsp-kafka-cluster-001
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafkadata:/var/kafka/data

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    ports:
      - "8181:8181"
      - "8182:8182"
    environment:
      ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: dsp
      DB_PASSWORD: dsp_dev_password
      DB_NAME: dsp
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dsp_dev_password}
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dsp_dev_password}
      API_PORT: 8181
      INTERNAL_PORT: 8182
      CORS_ALLOWED_ORIGINS: http://localhost:4000
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - uploadsdata:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8181/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  bidder:
    build:
      context: .
      dockerfile: deploy/Dockerfile.bidder
    restart: unless-stopped
    ports:
      - "8180:8180"
    environment:
      ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: dsp
      DB_PASSWORD: dsp_dev_password
      DB_NAME: dsp
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dsp_dev_password}
      KAFKA_BROKERS: kafka:19094
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dsp_dev_password}
      BIDDER_PORT: 8180
      BIDDER_PUBLIC_URL: http://localhost:8180
      BIDDER_HMAC_SECRET: ${BIDDER_HMAC_SECRET:-dev-hmac-secret-change-in-production}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8180/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  consumer:
    build:
      context: .
      dockerfile: deploy/Dockerfile.consumer
    restart: unless-stopped
    environment:
      ENV: development
      KAFKA_BROKERS: kafka:19094
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dsp_dev_password}
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8181
        NEXT_PUBLIC_ADMIN_API_URL: http://localhost:8182
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8181
      NEXT_PUBLIC_ADMIN_API_URL: http://localhost:8182
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      api:
        condition: service_healthy
      bidder:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/provisioning:/etc/grafana/provisioning
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  chdata:
  redisdata:
  kafkadata:
  grafanadata:
  uploadsdata:
