name: dsp-main

services:
  postgres:
    container_name: postgres-main
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: dsp
      POSTGRES_USER: dsp
      POSTGRES_PASSWORD: dsp_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    container_name: redis-main
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "16380:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-dsp_dev_password}", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dsp_dev_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    container_name: clickhouse-main
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    ports:
      - "18124:8123"
      - "19001:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dsp_dev_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "${CLICKHOUSE_PASSWORD:-dsp_dev_password}", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    container_name: kafka-main
    image: apache/kafka:latest
    restart: unless-stopped
    ports:
      - "19094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9193
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19094,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9193
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19094,EXTERNAL://localhost:19094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      CLUSTER_ID: dsp-kafka-cluster-001
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafkadata:/var/kafka/data

  migrate:
    container_name: migrate-main
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: dsp
      DB_PASSWORD: dsp_dev_password
      DB_NAME: dsp
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dsp_dev_password}
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        for f in /migrations/*.sql; do
          case "$$f" in
            */002_clickhouse.sql|*/008_clickhouse_attribution.sql) continue ;;
          esac
          echo "Applying $$f"
          PGPASSWORD="$$DB_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$DB_USER" -d "$$DB_NAME" -v ON_ERROR_STOP=1 -f "$$f" >/dev/null
        done &&
        for f in /migrations/002_clickhouse.sql /migrations/008_clickhouse_attribution.sql; do
          if [ -f "$$f" ]; then
            echo "Applying $$f (ClickHouse)"
            awk '
              BEGIN { RS=";"; ORS="" }
              {
                gsub(/\r/, "", $$0)
                stmt = ""
                line_count = split($$0, lines, /\n/)
                for (i = 1; i <= line_count; i++) {
                  if (lines[i] ~ /^[[:space:]]*--/) continue
                  if (lines[i] ~ /^[[:space:]]*$$/) continue
                  stmt = stmt lines[i] "\n"
                }
                if (stmt != "") {
                  file = sprintf("/tmp/clickhouse-stmt-%d.sql", ++count)
                  print stmt > file
                  close(file)
                  print file "\n"
                }
              }
            ' "$$f" | while IFS= read -r stmt_file; do
              [ -n "$$stmt_file" ] || continue
              wget -qO- "http://$$CLICKHOUSE_HOST:$$CLICKHOUSE_HTTP_PORT/?user=$$CLICKHOUSE_USER&password=$$CLICKHOUSE_PASSWORD" --post-file="$$stmt_file" >/dev/null || exit 1
              rm -f "$$stmt_file"
            done
          fi
        done

  api:
    container_name: api-main
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "18181:8181"
      - "18182:8182"
    environment:
      ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: dsp
      DB_PASSWORD: dsp_dev_password
      DB_NAME: dsp
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dsp_dev_password}
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dsp_dev_password}
      API_PORT: 8181
      INTERNAL_PORT: 8182
      CORS_ALLOWED_ORIGINS: http://localhost:14000
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploadsdata:/app/var/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8181/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  bidder:
    container_name: bidder-main
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.bidder
    restart: unless-stopped
    ports:
      - "18180:8180"
    environment:
      ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: dsp
      DB_PASSWORD: dsp_dev_password
      DB_NAME: dsp
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dsp_dev_password}
      KAFKA_BROKERS: kafka:19094
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dsp_dev_password}
      BIDDER_PORT: 8180
      BIDDER_PUBLIC_URL: http://localhost:18180
      BIDDER_HMAC_SECRET: ${BIDDER_HMAC_SECRET:-dev-hmac-secret-change-in-production}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8180/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  consumer:
    container_name: consumer-main
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.consumer
    restart: unless-stopped
    environment:
      ENV: development
      KAFKA_BROKERS: kafka:19094
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dsp_dev_password}
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  web:
    container_name: web-main
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:18181
        NEXT_PUBLIC_ADMIN_API_URL: http://localhost:18182
    restart: unless-stopped
    ports:
      - "14000:4000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:18181
      NEXT_PUBLIC_ADMIN_API_URL: http://localhost:18182
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    container_name: prometheus-main
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-20090}:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      api:
        condition: service_healthy
      bidder:
        condition: service_healthy

  grafana:
    container_name: grafana-main
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-14100}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/monitoring/provisioning:/etc/grafana/provisioning
      - ./deploy/monitoring/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
    name: dsp_pgdata
  chdata:
    name: dsp_chdata
  redisdata:
    name: dsp_redisdata
  kafkadata:
    name: dsp_kafkadata
  grafanadata:
    name: dsp_grafanadata
  uploadsdata:
    name: dsp_uploadsdata
