openapi: 3.0.0
info:
  contact: {}
  description: Demand-Side Platform — programmatic advertising API
  title: DSP Platform API
  version: "1.0"
paths:
  /ad-types:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
      summary: List available ad types
      tags:
        - reference
  /admin/advertisers:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/internal_handler.AdvertiserResponse"
                type: array
      security:
        - AdminAuth: []
      summary: List all advertisers (admin, api_key redacted)
      tags:
        - admin
    post:
      description: |-
        Admin-only shortcut for bootstrapping an advertiser. Regular
        tenants must use POST /api/v1/register → admin approval
        instead. This endpoint was moved behind admin auth in V5.1
        to close a privilege-escalation path where any authenticated
        tenant could POST /api/v1/advertisers with a client-chosen
        balance_cents and receive a new api_key for an arbitrarily
        pre-funded advertiser account, which could then be used to
        spend ADX dollars without going through the top-up audit
        trail. The legitimate public bootstrap path is POST
        /api/v1/register (see HandleRegister).
      requestBody:
        content:
          application/json:
            schema:
              properties:
                balance_cents:
                  type: integer
                company_name:
                  type: string
                contact_email:
                  type: string
              type: object
        description: Advertiser data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                properties:
                  api_key:
                    type: string
                  id:
                    type: integer
                  message:
                    type: string
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - AdminAuth: []
      summary: Create advertiser (admin only)
      tags:
        - admin
  /admin/audit-log:
    get:
      parameters:
        - description: Limit
          in: query
          name: limit
          schema:
            type: integer
            default: 50
        - description: Offset
          in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_audit.Entry"
                type: array
      security:
        - AdminAuth: []
      summary: Get audit log
      tags:
        - admin
  /admin/circuit-break:
    post:
      description: |-
        Opens the circuit breaker (standard CB terminology: open = tripped,
        traffic blocked). All bidding stops until the breaker is reset.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                reason:
                  type: string
              type: object
        description: Trip reason
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  reason:
                    type: string
                  status:
                    type: string
                type: object
      security:
        - AdminAuth: []
      summary: Trip circuit breaker
      tags:
        - admin
  /admin/circuit-reset:
    post:
      description: |-
        Closes the circuit breaker (standard CB terminology: closed = normal,
        traffic flowing). Bidding resumes.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                type: object
      security:
        - AdminAuth: []
      summary: Reset circuit breaker
      tags:
        - admin
  /admin/circuit-status:
    get:
      description: >-
        Returns the current circuit breaker state using standard CB terminology:

        "closed" = normal operation (breaker closed, circuit connected, traffic flowing).

        "open" = tripped (breaker open, circuit broken, fail-fast, traffic blocked).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_handler.CircuitStatusResponse"
      security:
        - AdminAuth: []
      summary: Get circuit breaker status
      tags:
        - admin
  /admin/creatives:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_campaign.Creat\
                    ive"
                type: array
      security:
        - AdminAuth: []
      summary: List creatives for review
      tags:
        - admin
  "/admin/creatives/{id}/approve":
    post:
      parameters:
        - description: Creative ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                properties:
                  status:
                    type: string
                type: object
      security:
        - AdminAuth: []
      summary: Approve creative
      tags:
        - admin
  "/admin/creatives/{id}/reject":
    post:
      parameters:
        - description: Creative ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/Body"
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                properties:
                  status:
                    type: string
                type: object
      security:
        - AdminAuth: []
      summary: Reject creative
      tags:
        - admin
  /admin/health:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_handler.SystemHealthResponse"
      security:
        - AdminAuth: []
      summary: Get system health
      tags:
        - admin
  /admin/invite-codes:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_registration.I\
                    nviteCode"
                type: array
      security:
        - AdminAuth: []
      summary: List invite codes
      tags:
        - admin
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                expires_at:
                  type: string
                max_uses:
                  type: integer
              type: object
        description: Invite code config
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: string
                type: object
      security:
        - AdminAuth: []
      summary: Create invite code
      tags:
        - admin
  /admin/registrations:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_registration.R\
                    equest"
                type: array
      security:
        - AdminAuth: []
      summary: List pending registrations
      tags:
        - admin
  "/admin/registrations/{id}/approve":
    post:
      parameters:
        - description: Registration ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_handler.RegistrationApprovedResponse"
      security:
        - AdminAuth: []
      summary: Approve registration
      tags:
        - admin
  "/admin/registrations/{id}/reject":
    post:
      parameters:
        - description: Registration ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/Body"
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                properties:
                  status:
                    type: string
                type: object
      security:
        - AdminAuth: []
      summary: Reject registration
      tags:
        - admin
  /admin/topup:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                advertiser_id:
                  type: integer
                amount_cents:
                  type: integer
                description:
                  type: string
              type: object
        description: Top-up data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_billing.Transa\
                  ction"
      security:
        - AdminAuth: []
      summary: Admin top-up advertiser balance
      tags:
        - admin
  /admin/users:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_user.UserRespo\
                    nse"
                type: array
      security:
        - BearerAuth: []
      summary: List all users (admin only)
      tags:
        - admin
    post:
      description: >-
        Creates a user account. For role=advertiser, also creates an advertiser

        row and generates an API key. For role=platform_admin, creates user only.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  type: string
                name:
                  type: string
                password:
                  type: string
                role:
                  type: string
              type: object
        description: User data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                properties:
                  api_key:
                    type: string
                  user:
                    type: object
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - BearerAuth: []
      summary: Create a new user (admin only)
      tags:
        - admin
  "/admin/users/{id}":
    put:
      description: Update user status and/or name. Suspending a user clears their
        refresh token.
      parameters:
        - description: User ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
                status:
                  type: string
              type: object
        description: Fields to update
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - BearerAuth: []
      summary: Update a user (admin only)
      tags:
        - admin
  "/advertisers/{id}":
    get:
      parameters:
        - description: Advertiser ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_handler.AdvertiserResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - ApiKeyAuth: []
      summary: Get advertiser by ID (self only)
      tags:
        - advertisers
  /analytics/snapshot:
    get:
      description: |-
        Authenticates via the same `?token=` query parameter as
        /analytics/stream. See that endpoint for the full
        rationale. V5.1 P1-1.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - SSETokenAuth: []
      summary: Get analytics snapshot
      tags:
        - analytics
  /analytics/stream:
    get:
      description: |-
        Authenticates via a short-lived HMAC token passed in the
        `?token=` query parameter (NOT via X-API-Key header, and
        NOT via an `?api_key=` query fallback — that was the
        V5.1 P1-1 vulnerability). Clients mint the token via
        POST /api/v1/analytics/token.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            text/event-stream:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - SSETokenAuth: []
      summary: Real-time analytics SSE stream
      tags:
        - analytics
  /analytics/token:
    post:
      description: >-
        Returns a 5-minute HMAC-signed token bound to the authenticated
        advertiser.

        Clients use this token in the ?token= query of /analytics/stream and /analytics/snapshot

        to authenticate EventSource connections without exposing the long-lived X-API-Key

        in URL query logs (V5.1 P1-1).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_handler.AnalyticsTokenResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - ApiKeyAuth: []
      summary: Issue a short-lived SSE auth token for analytics endpoints
      tags:
        - analytics
  /audit-log:
    get:
      parameters:
        - description: Limit
          in: query
          name: limit
          schema:
            type: integer
            default: 50
        - description: Offset
          in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_audit.Entry"
                type: array
      security:
        - ApiKeyAuth: []
      summary: Get my audit log
      tags:
        - audit
  /auth/change-password:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                new_password:
                  type: string
                old_password:
                  type: string
              type: object
        description: Password change
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - BearerAuth: []
      summary: Change current user's password
      tags:
        - auth
  /auth/login:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  type: string
                password:
                  type: string
              type: object
        description: Credentials
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  user:
                    type: object
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      summary: Login with email + password
      tags:
        - auth
  /auth/me:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_user.UserRespo\
                  nse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - BearerAuth: []
      summary: Get current user info
      tags:
        - auth
  /auth/refresh:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                refresh_token:
                  type: string
              type: object
        description: Refresh token
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  access_token:
                    type: string
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      summary: Refresh access token
      tags:
        - auth
  /billing-models:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
      summary: List billing models
      tags:
        - reference
  /billing/balance:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  advertiser_id:
                    type: integer
                  balance_cents:
                    type: integer
                  billing_type:
                    type: string
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - ApiKeyAuth: []
      summary: Get the authenticated advertiser's balance
      tags:
        - billing
  "/billing/balance/{id}":
    get:
      deprecated: true
      description: Legacy alias for GET /billing/balance. The path id must match the
        authenticated advertiser or the response is 404. New clients should use
        GET /billing/balance which derives the advertiser from the auth context.
      parameters:
        - description: Advertiser ID (must match authenticated advertiser)
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  advertiser_id:
                    type: integer
                  balance_cents:
                    type: integer
                  billing_type:
                    type: string
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - ApiKeyAuth: []
      summary: "[Deprecated] Get advertiser balance via legacy path id"
      tags:
        - billing
  /billing/topup:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                amount_cents:
                  type: integer
                description:
                  type: string
              type: object
        description: Top-up data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_billing.Transa\
                  ction"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - ApiKeyAuth: []
      summary: Top up the authenticated advertiser's balance
      tags:
        - billing
  /billing/transactions:
    get:
      parameters:
        - description: Limit
          in: query
          name: limit
          schema:
            type: integer
            default: 50
        - description: Offset
          in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_billing.Transa\
                    ction"
                type: array
      security:
        - ApiKeyAuth: []
      summary: List billing transactions for the authenticated advertiser
      tags:
        - billing
  /campaigns:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_campaign.Campa\
                    ign"
                type: array
      security:
        - ApiKeyAuth: []
      summary: List campaigns for advertiser
      tags:
        - campaigns
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                advertiser_id:
                  type: integer
                bid_cpm_cents:
                  type: integer
                billing_model:
                  type: string
                budget_daily_cents:
                  type: integer
                budget_total_cents:
                  type: integer
                name:
                  type: string
              type: object
        description: Campaign data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                properties:
                  id:
                    type: integer
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
      security:
        - ApiKeyAuth: []
      summary: Create campaign
      tags:
        - campaigns
  "/campaigns/{id}":
    get:
      parameters:
        - description: Campaign ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_campaign.Campa\
                  ign"
      security:
        - ApiKeyAuth: []
      summary: Get campaign by ID
      tags:
        - campaigns
    put:
      parameters:
        - description: Campaign ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                bid_cpm_cents:
                  type: integer
                budget_daily_cents:
                  type: integer
                name:
                  type: string
                targeting:
                  type: object
              type: object
        description: Update fields
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                type: object
      security:
        - ApiKeyAuth: []
      summary: Update campaign
      tags:
        - campaigns
  "/campaigns/{id}/creatives":
    get:
      parameters:
        - description: Campaign ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/github_com_heartgryphon_dsp_internal_campaign.Creat\
                    ive"
                type: array
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
        "404":
