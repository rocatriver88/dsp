servers:
  - url: //localhost:8181/api/v1
components:
  requestBodies:
    Body:
      content:
        application/json:
          schema:
            properties:
              reason:
                type: string
            type: object
      description: Rejection reason
      required: true
  securitySchemes:
    AdminAuth:
      in: header
      name: X-Admin-Token
      type: apiKey
    ApiKeyAuth:
      in: header
      name: X-API-Key
      type: apiKey
    SSETokenAuth:
      description: |-
        V5.1 P1-1: analytics SSE endpoints authenticate via a
        short-lived HMAC token passed in the `?token=` query
        parameter, NOT via the long-lived X-API-Key header.
        Clients mint a token by POSTing to /analytics/token with
        the X-API-Key header (ApiKeyAuth) and receive a
        5-minute bearer good for /analytics/stream and
        /analytics/snapshot. This scheme exists specifically so
        EventSource clients (which cannot set custom headers) do
        not have to put their long-lived tenant credential in
        URL query, which would leak it into proxy logs, browser
        history, and referrer headers.
      in: query
      name: token
      type: apiKey
  schemas:
    github_com_heartgryphon_dsp_internal_audit.Entry:
      properties:
        action:
          type: string
        actor:
          type: string
