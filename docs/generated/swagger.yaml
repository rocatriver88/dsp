      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
      security:
      - AdminAuth: []
      summary: Approve creative
      tags:
      - admin
  /admin/creatives/{id}/reject:
    post:
      consumes:
      - application/json
      parameters:
      - description: Creative ID
        in: path
        name: id
        required: true
        type: integer
      - description: Rejection reason
        in: body
        name: body
        required: true
        schema:
          properties:
            reason:
              type: string
          type: object
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
      security:
      - AdminAuth: []
