      security:
      - AdminAuth: []
      summary: List invite codes
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: Invite code config
        in: body
        name: body
        required: true
        schema:
          properties:
            expires_at:
              type: string
            max_uses:
