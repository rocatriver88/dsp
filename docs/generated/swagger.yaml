      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              advertiser_id:
                type: integer
              api_key:
                type: string
              message:
                type: string
            type: object
      security:
      - AdminAuth: []
      summary: Approve registration
      tags:
      - admin
  /admin/registrations/{id}/reject:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration ID
        in: path
        name: id
        required: true
        type: integer
      - description: Rejection reason
        in: body
        name: body
        required: true
        schema:
          properties:
            reason:
              type: string
          type: object
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
      security:
      - AdminAuth: []
      summary: Reject registration
      tags:
      - admin
  /admin/topup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Top-up data
        in: body
        name: body
        required: true
        schema:
          properties:
            advertiser_id:
              type: integer
            amount_cents:
              type: integer
            description:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_heartgryphon_dsp_internal_billing.Transaction'
      security:
      - AdminAuth: []
      summary: Admin top-up advertiser balance
      tags:
      - admin
  /advertisers:
    post:
      consumes:
      - application/json
      parameters:
      - description: Advertiser data
        in: body
        name: body
        required: true
        schema:
          properties:
            balance_cents:
              type: integer
            company_name:
              type: string
            contact_email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              api_key:
                type: string
              id:
                type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Create advertiser
      tags:
      - advertisers
  /advertisers/{id}:
    get:
      parameters:
      - description: Advertiser ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AdvertiserResponse'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get advertiser by ID (self only)
      tags:
      - advertisers
  /analytics/snapshot:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get analytics snapshot
      tags:
      - analytics
  /analytics/stream:
    get:
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Real-time analytics SSE stream
      tags:
      - analytics
  /audit-log:
    get:
      parameters:
      - default: 50
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_heartgryphon_dsp_internal_audit.Entry'
            type: array
      security:
      - ApiKeyAuth: []
