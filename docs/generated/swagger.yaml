      tags:
      - admin
  /admin/health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              active_campaigns:
                type: integer
              status:
                type: string
              time:
                type: string
            type: object
      security:
      - AdminAuth: []
