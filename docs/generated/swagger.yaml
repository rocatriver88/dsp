        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Top up the authenticated advertiser's balance
      tags:
      - billing
  /billing/transactions:
    get:
      parameters:
      - default: 50
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_heartgryphon_dsp_internal_billing.Transaction'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List billing transactions for the authenticated advertiser
