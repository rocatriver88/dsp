basePath: /api/v1
definitions:
  github_com_heartgryphon_dsp_internal_audit.Entry:
    properties:
      action:
        type: string
      actor:
        type: string
      advertiser_id:
        type: integer
      created_at:
        type: string
      details:
        additionalProperties: {}
        type: object
      id:
        type: integer
      resource_id:
        type: integer
      resource_type:
        type: string
    type: object
  github_com_heartgryphon_dsp_internal_billing.Transaction:
    properties:
      advertiser_id:
        type: integer
      amount_cents:
        type: integer
      balance_after:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      reference_id:
        type: string
      type:
        type: string
    type: object
  github_com_heartgryphon_dsp_internal_campaign.Campaign:
    properties:
      advertiser_id:
        type: integer
      bid_cpc_cents:
        type: integer
      bid_cpm_cents:
        type: integer
      billing_model:
        type: string
      budget_daily_cents:
        type: integer
      budget_total_cents:
        type: integer
      created_at:
        type: string
      end_date:
        type: string
      id:
        type: integer
      name:
        type: string
      ocpm_target_cpa_cents:
        type: integer
      pause_reason:
        type: string
      paused_at:
        type: string
      sandbox:
        type: boolean
      spent_cents:
        type: integer
      start_date:
        type: string
      status:
        $ref: '#/definitions/github_com_heartgryphon_dsp_internal_campaign.Status'
      targeting:
        items:
          type: integer
        type: array
      updated_at:
        type: string
    type: object
  github_com_heartgryphon_dsp_internal_campaign.Creative:
    properties:
      ad_markup:
        type: string
      ad_type:
        type: string
      campaign_id:
        type: integer
      created_at:
        type: string
      destination_url:
        type: string
      format:
        type: string
      id:
        type: integer
      name:
        type: string
      native_cta:
        type: string
      native_desc:
        type: string
      native_icon_url:
        type: string
      native_image_url:
        type: string
      native_title:
        description: Native ad fields (used when ad_type = "native")
        type: string
      size:
        type: string
      status:
        type: string
    type: object
  github_com_heartgryphon_dsp_internal_campaign.Status:
    enum:
    - draft
    - active
    - paused
    - completed
    - deleted
    type: string
    x-enum-varnames:
    - StatusDraft
    - StatusActive
    - StatusPaused
    - StatusCompleted
    - StatusDeleted
  github_com_heartgryphon_dsp_internal_registration.InviteCode:
    properties:
      code:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      max_uses:
        type: integer
      used_count:
        type: integer
    type: object
  github_com_heartgryphon_dsp_internal_registration.Request:
    properties:
      business_type:
        type: string
      company_name:
        type: string
      contact_email:
        type: string
      contact_phone:
        type: string
      created_at:
        type: string
      id:
        type: integer
      invite_code:
        type: string
      reject_reason:
        type: string
      reviewed_at:
        type: string
      reviewed_by:
        type: string
      status:
        type: string
      website:
        type: string
    type: object
  github_com_heartgryphon_dsp_internal_reporting.AttributionReport:
    properties:
      campaign_id:
        type: integer
      model:
        type: string
      paths:
        items:
          $ref: '#/definitions/github_com_heartgryphon_dsp_internal_reporting.ConversionPath'
        type: array
      summary:
        $ref: '#/definitions/github_com_heartgryphon_dsp_internal_reporting.AttributionSummary'
      total_conversions:
        type: integer
      window:
        type: string
    type: object
  github_com_heartgryphon_dsp_internal_reporting.AttributionSummary:
    properties:
      avg_time_to_convert:
        type: string
      avg_touchpoints:
        type: number
      click_conversions:
        description: conversions with a click in path
        type: integer
      view_conversions:
        description: conversions with impression only
        type: integer
    type: object
  github_com_heartgryphon_dsp_internal_reporting.BidDetail:
    properties:
      bid_price_cents:
        type: integer
      clear_price_cents:
        type: integer
      device_os:
        type: string
      event_type:
        type: string
      geo_country:
        type: string
      loss_reason:
        type: string
      request_id:
        type: string
      time:
        type: string
    type: object
  github_com_heartgryphon_dsp_internal_reporting.BidSimulation:
    properties:
      actual_wins:
        type: integer
      current_bid_cpm_cents:
        type: integer
      current_win_rate:
        type: number
      data_days:
        type: integer
      max_clear_price_cents:
        type: integer
      median_clear_price_cents:
        type: integer
      simulated_bid_cpm_cents:
        type: integer
      simulated_spend_cents:
        type: integer
      simulated_win_rate:
        type: number
      simulated_wins:
        type: integer
      total_bids:
        type: integer
    type: object
  github_com_heartgryphon_dsp_internal_reporting.CampaignStats:
    properties:
      adx_cost_cents:
        description: ADX settlement cost (cents)
        type: integer
      bids:
        type: integer
      campaign_id:
        type: integer
      clicks:
        type: integer
      conversions:
        type: integer
      cpa:
        type: number
      ctr:
        type: number
      cvr:
        type: number
      impressions:
        type: integer
      profit_cents:
        description: spend - adx_cost (cents)
        type: integer
      spend_cents:
        description: advertiser charge total (cents)
        type: integer
      win_rate:
        type: number
      wins:
        type: integer
    type: object
  github_com_heartgryphon_dsp_internal_reporting.ConversionPath:
    properties:
      campaign_id:
        type: integer
      conversion_time:
        type: string
      credit:
        items:
          $ref: '#/definitions/github_com_heartgryphon_dsp_internal_reporting.CreditedEvent'
        type: array
      device_id:
        type: string
      model:
        type: string
      touchpoints:
        items:
          $ref: '#/definitions/github_com_heartgryphon_dsp_internal_reporting.Touchpoint'
        type: array
    type: object
  github_com_heartgryphon_dsp_internal_reporting.CreditedEvent:
    properties:
      credit:
        description: 0.0 - 1.0
        type: number
      event_type:
        type: string
      request_id:
        type: string
    type: object
  github_com_heartgryphon_dsp_internal_reporting.GeoStats:
    properties:
      clicks:
        type: integer
      country:
        type: string
      impressions:
        type: integer
      spend_cents:
        type: integer
    type: object
  github_com_heartgryphon_dsp_internal_reporting.HourlyStats:
    properties:
      clicks:
        type: integer
      hour:
        type: integer
      impressions:
        type: integer
      spend_cents:
        type: integer
    type: object
  github_com_heartgryphon_dsp_internal_reporting.Touchpoint:
    properties:
      creative_id:
        type: integer
      event_type:
        description: impression or click
        type: string
      request_id:
        type: string
      time:
        type: string
    type: object
  internal_handler.AdvertiserResponse:
    properties:
      active_campaigns:
        type: integer
      balance_cents:
        type: integer
      billing_type:
        type: string
      company_name:
        type: string
      contact_email:
        type: string
      created_at:
        type: string
      id:
        type: integer
      total_spent_cents:
        type: integer
      updated_at:
        type: string
    type: object
host: localhost:8181
info:
  contact: {}
  description: Demand-Side Platform — programmatic advertising API
  title: DSP Platform API
  version: "1.0"
paths:
  /ad-types:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      summary: List available ad types
      tags:
      - reference
  /admin/advertisers:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler.AdvertiserResponse'
            type: array
      security:
      - AdminAuth: []
      summary: List all advertisers (admin, api_key redacted)
      tags:
      - admin
  /admin/audit-log:
    get:
      parameters:
      - default: 50
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_heartgryphon_dsp_internal_audit.Entry'
            type: array
      security:
      - AdminAuth: []
      summary: Get audit log
      tags:
      - admin
  /admin/circuit-break:
    post:
      consumes:
      - application/json
      parameters:
      - description: Trip reason
        in: body
        name: body
        required: true
        schema:
          properties:
            reason:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              reason:
                type: string
              status:
                type: string
            type: object
      security:
      - AdminAuth: []
      summary: Trip circuit breaker
      tags:
      - admin
  /admin/circuit-reset:
    post:
      produces:
