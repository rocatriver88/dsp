            bid_cpm_cents:
              type: integer
            billing_model:
              type: string
            budget_daily_cents:
              type: integer
            budget_total_cents:
              type: integer
            name:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              id:
                type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create campaign
      tags:
      - campaigns
  /campaigns/{id}:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_heartgryphon_dsp_internal_campaign.Campaign'
