# Isolated test environment — all ports offset by +1000 to avoid conflicts with dev
# Usage: docker compose -p dsp-test -f docker-compose.test.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "6432:5432"
    environment:
      POSTGRES_DB: dsp_test
      POSTGRES_USER: dsp
      POSTGRES_PASSWORD: dsp_test_password
    volumes:
      - test-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "7380:6379"
    command: ["redis-server", "--requirepass", "dsp_test_password", "--appendonly", "yes"]
    volumes:
      - test-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dsp_test_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "9124:8123"
      - "10001:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: dsp_test_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - test-chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "dsp_test_password", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    ports:
      - "10094:10094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9193
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:10094,CONTROLLER://0.0.0.0:9193
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:10094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: dsp-test-cluster-001
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - test-kafkadata:/var/kafka/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "10090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "4100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/provisioning:/etc/grafana/provisioning
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
      - test-grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  test-pgdata:
  test-chdata:
  test-redisdata:
  test-kafkadata:
  test-grafanadata:
