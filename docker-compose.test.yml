# Isolated test environment — core services only, ports offset to avoid conflicts
# Usage: docker compose -p dsp-test -f docker-compose.test.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "6432:5432"
    environment:
      POSTGRES_DB: dsp_test
      POSTGRES_USER: dsp
      POSTGRES_PASSWORD: dsp_test_password
    volumes:
      - test-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "7380:6379"
    command: ["redis-server", "--requirepass", "dsp_test_password", "--appendonly", "yes"]
    volumes:
      - test-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dsp_test_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "9124:8123"
      - "10001:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: dsp_test_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - test-chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password dsp_test_password -q 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    ports:
      - "10094:10094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9193
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:10094,CONTROLLER://0.0.0.0:9193
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:10094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: dsp-test-cluster-001
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - test-kafkadata:/var/kafka/data

volumes:
  test-pgdata:
  test-chdata:
  test-redisdata:
  test-kafkadata:
