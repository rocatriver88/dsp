name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsp_test
          POSTGRES_USER: dsp
          POSTGRES_PASSWORD: dsp_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dsp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall

      - name: Test
        run: go test ./internal/... -v -count=1 -race
        env:
          DB_HOST: localhost
          DB_USER: dsp
          DB_PASSWORD: dsp_test_password
          DB_NAME: dsp_test
          REDIS_ADDR: localhost:6379

      - name: Build
        run: |
          go build -o bin/bidder ./cmd/bidder
          go build -o bin/api ./cmd/api
          go build -o bin/consumer ./cmd/consumer

  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      # Spin up the real backing services via the project's docker-compose.
      # We reuse the production compose file (not docker-compose.test.yml) so
      # qaharness defaults (ports 15432 / 16380 / 19001 / 19094, passwords
      # dsp_dev_password) match without any override. The trade-off is a heavier
      # image pull on first run; subsequent runs benefit from layer caching.
      - name: Start backing services
        run: docker compose up -d postgres redis kafka clickhouse

      # migrate depends_on postgres+clickhouse healthy, so this blocks until
      # both are ready. Exits non-zero if any migration fails.
      - name: Apply migrations
        run: docker compose run --rm migrate

      # Kafka doesn't define a healthcheck in docker-compose.yml (apache/kafka
      # doesn't ship a built-in healthcheck command). Poll the admin API until
      # Kafka is ready to accept metadata requests, so producer-using tests
      # don't race startup.
      - name: Wait for Kafka
        run: |
          timeout 180 bash -c '
            until docker exec kafka-main /opt/kafka/bin/kafka-topics.sh \
              --bootstrap-server kafka:19094 --list >/dev/null 2>&1; do
              echo "Waiting for Kafka..."
              sleep 2
            done
            echo "Kafka is ready"
          '

      # Pre-create every topic the bidder produces to. The async kafka-go
      # Writer silently drops the first message to a not-yet-existing topic
      # during the auto-create / metadata-propagation window — reproduced
      # locally 2026-04-19 as the root cause of TestEngine_BidHappyPath
      # flaking in CI with "dsp.bids count: want 1 got 0". Explicit
      # pre-creation eliminates the race and makes producer-using tests
      # deterministic.
      - name: Pre-create Kafka topics
        run: |
          for topic in dsp.bids dsp.impressions dsp.billing dsp.dead-letter; do
            docker exec kafka-main /opt/kafka/bin/kafka-topics.sh \
              --bootstrap-server kafka:19094 \
              --create --if-not-exists \
              --topic "$topic" \
              --partitions 3 \
              --replication-factor 1
          done

      - name: Integration tests
        run: bash scripts/test-integration-serial.sh
        env:
          QA_POSTGRES_DSN: postgres://dsp:dsp_dev_password@localhost:15432/dsp?sslmode=disable
          QA_REDIS_ADDR: localhost:16380
          QA_REDIS_PASSWORD: dsp_dev_password
          QA_REDIS_DB: 15
          QA_CLICKHOUSE_ADDR: localhost:19001
          QA_CLICKHOUSE_USER: default
          QA_CLICKHOUSE_PASSWORD: dsp_dev_password
          QA_KAFKA_BROKERS: localhost:19094

      - name: Service logs on failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Tear down
        if: always()
        run: docker compose down -v

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -f deploy/docker/Dockerfile.bidder -t dsp-bidder:${{ github.sha }} .
          docker build -f deploy/docker/Dockerfile.api -t dsp-api:${{ github.sha }} .
          docker build -f deploy/docker/Dockerfile.consumer -t dsp-consumer:${{ github.sha }} .

      # Push to registry when configured:
      # - name: Push
      #   run: |
      #     docker tag dsp-bidder:${{ github.sha }} $REGISTRY/dsp-bidder:latest
      #     docker push $REGISTRY/dsp-bidder:latest

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Lint
        working-directory: web
        run: npm run lint

  docs-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.4

      - name: Install npm deps
        working-directory: web
        run: npm ci

      - name: Check generated contract is up to date
        run: make docs-check
